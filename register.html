<body>

            <a href="info.html">Info</a>
            <button class="ticket-btn">Buy Ticket</button>
        </nav>
    </header>

    <!-- Header -->
    <section class="page-header">
        <h2>ลงทะเบียนร่วมงานฟรี!</h2>
        <p>วันที่ 25 ธันวาคม 2568 | ⏰ เริ่ม 16:00 น. | 📍 CentralWorld</p>
    </section>

    <!--Register form  -->
    <section class="register-section">
        <form id="registerForm" class="register-form">
            <h3>แบบฟอร์มลงทะเบียน</h3>

            <label>ชื่อ - นามสกุล</label>
            <input type="text" id="name" , name="name" placeholder="กรอกชื่อ- นามสกุล" required>

            <label>E-mail</label>
            <input type="email" id="email" , name="email" placeholder="example@gmail.com" required>

            <label>เบอร์โทรศัพท์</label>
            <input type="tel" id="phone" ,name="phone" placeholder="0xx-xxx-xxxx" required>

            <label class="checkbox">
                <input type="checkbox" id="agree" required>
                <span>ฉันยืนยันว่าข้อมูลถูกต้องและยอมรับเงื่อนไขการเข้าร่วมงาน</span>
            </label>

            <button type="submit" class="ticket-btn">ลงทะเบียน</button>
            <p id="statusMsg" class="status"></p>

        </form>

    </section>

    <script>
        const form = document.getElementById("registerForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;

            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, phone })
            });

            if (res.ok) {
                localStorage.setItem("userName", name);
                window.location.href = "/confirm";
            } else {
                alert("ลงทะเบียนไม่สำเร็จ");
            }
        });
    </script>


</body>
